name: CI

on:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Create .env
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Create .env
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/core test/features test/services

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Create .env
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run integration tests
        run: flutter test test/integration

  build:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Create .env
        run: touch .env

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release
